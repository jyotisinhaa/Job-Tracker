<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Job Hunt Tracker</title>
<style>
  :root {
    --ink: #1c2733;
    --ink-soft: #5b6b7a;
    --paper: #f6f4ee;
    --card: #ffffff;
    --line: #dcd8ca;
    --mono: 'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace;
    --sans: 'IBM Plex Sans', -apple-system, sans-serif;
    --saved: #5b6b7a;
    --applied: #3b5ba9;
    --screening: #b5811a;
    --interview: #6a4fb3;
    --offer: #1e8e5a;
    --rejected: #a3402f;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--paper); }
  .tracker { font-family: var(--sans); color: var(--ink); background: var(--paper); padding: 20px; max-width: 1400px; margin: 0 auto; }
  .tracker h2 { font-family: var(--mono); font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-soft); margin: 0 0 4px; font-weight: 500; }
  .tracker .sub { font-size: 13px; color: var(--ink-soft); margin: 0 0 18px; }
  .toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .toolbar input, .toolbar select { font-family: var(--sans); font-size: 13px; padding: 7px 10px; border: 1px solid var(--line); border-radius: 6px; background: var(--card); color: var(--ink); }
  .toolbar input[type="text"] { flex: 1; min-width: 160px; }
  .add-btn { font-family: var(--sans); font-size: 13px; padding: 7px 14px; border: 1px solid var(--ink); border-radius: 6px; background: var(--ink); color: var(--paper); cursor: pointer; }
  .add-btn:hover { opacity: 0.85; }
  .counts { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .count-pill { font-family: var(--mono); font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid var(--line); color: var(--ink-soft); background: var(--card); }
  .board { display: grid; grid-template-columns: repeat(6, minmax(150px, 1fr)); gap: 10px; overflow-x: auto; }
  .col { background: rgba(0,0,0,0.02); border-radius: 8px; padding: 8px; min-height: 80px; }
  .col-head { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; padding: 4px 4px 8px; display: flex; justify-content: space-between; }
  .job-card { background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 10px; margin-bottom: 8px; font-size: 12.5px; position: relative; }
  .job-card .role { font-weight: 500; margin: 0 0 2px; line-height: 1.3; }
  .job-card .company { color: var(--ink-soft); margin: 0 0 6px; }
  .job-card .meta { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
  .job-card select { font-size: 11px; padding: 3px 4px; border-radius: 5px; border: 1px solid var(--line); font-family: var(--sans); background: var(--paper); }
  .job-card a { font-size: 11px; color: var(--applied); text-decoration: none; }
  .job-card a:hover { text-decoration: underline; }
  .job-card .del { position: absolute; top: 6px; right: 6px; cursor: pointer; color: var(--ink-soft); font-size: 12px; border: none; background: none; }
  .job-card .del:hover { color: var(--rejected); }
  .job-card textarea { width: 100%; font-family: var(--sans); font-size: 11.5px; border: 1px solid var(--line); border-radius: 5px; padding: 4px 6px; margin-top: 6px; resize: vertical; min-height: 30px; background: var(--paper); color: var(--ink); }
  .empty { font-size: 11.5px; color: var(--ink-soft); padding: 6px 4px; }
  .export-note { font-size: 11px; color: var(--ink-soft); margin-top: 20px; }
  @media (max-width: 900px) {
    .board { grid-template-columns: repeat(6, minmax(220px, 1fr)); }
  }
</style>
</head>
<body>
<div class="tracker">
  <h2>Job hunt tracker</h2>
  <p class="sub">Backend / AI engineering roles &mdash; Mountain View + Bay Area + Remote</p>
  <div class="toolbar">
    <input type="text" id="newRole" placeholder="Role title" />
    <input type="text" id="newCompany" placeholder="Company" />
    <input type="text" id="newUrl" placeholder="Job URL (optional)" />
    <button class="add-btn" id="addBtn">Add job</button>
  </div>
  <div class="counts" id="counts"></div>
  <div class="board" id="board"></div>
  <p class="export-note">Data is stored locally in this browser (localStorage). Use the same browser/device to see your saved jobs, or export/import via the buttons below if you switch machines.</p>
  <div class="toolbar">
    <button class="add-btn" id="exportBtn">Export data (JSON)</button>
    <input type="file" id="importFile" accept="application/json" style="display:none" />
    <button class="add-btn" id="importBtn">Import data</button>
  </div>
</div>
<script>
(function() {
  var STATUSES = ["Saved", "Applied", "Screening", "Interview", "Offer", "Rejected"];
  var COLORS = { Saved: "var(--saved)", Applied: "var(--applied)", Screening: "var(--screening)", Interview: "var(--interview)", Offer: "var(--offer)", Rejected: "var(--rejected)" };
  var STORE_KEY = "job-tracker-entries";
  var jobs = [];

  var seed = [
    {role:"Staff AI Engineer – Agentic AI and Automaton", company:"Collective Health", location:"San Francisco, CA", url:"https://www.linkedin.com/jobs/view/staff-ai-engineer-%E2%80%93-agentic-ai-and-automaton-at-collective-health-4437454728", status:"Saved"},
    {role:"Agentic AI Engineer", company:"BayOne Solutions", location:"San Francisco, CA", url:"https://www.linkedin.com/jobs/view/agentic-ai-engineer-at-bayone-solutions-4434129974", status:"Saved"},
    {role:"Principal AI Platform Engineer", company:"SWITS DIGITAL", location:"San Francisco, CA", url:"https://www.linkedin.com/jobs/view/principal-ai-platform-engineer-at-swits-digital-private-limited-4437467752", status:"Saved"},
    {role:"Backend Engineer II", company:"HackerRank", location:"Santa Clara, CA", url:"https://www.linkedin.com/jobs/view/backend-engineer-ii-at-hackerrank-4399933005", status:"Saved"},
    {role:"Senior Backend Engineer", company:"HackerRank", location:"Santa Clara, CA", url:"https://www.linkedin.com/jobs/view/senior-backend-engineer-at-hackerrank-4391479551", status:"Saved"},
    {role:"Software Engineer III, Agents Platform", company:"Box", location:"Redwood City, CA", url:"https://www.linkedin.com/jobs/view/software-engineer-iii-agents-platform-at-box-4437401741", status:"Saved"},
    {role:"Senior Software Engineer, AI Platform", company:"Dexmate", location:"Fremont, CA", url:"https://www.linkedin.com/jobs/view/senior-software-engineer-ai-platform-at-dexmate-4400972559", status:"Saved"},
    {role:"Senior Software Engineer, AI", company:"People In AI", location:"San Francisco Bay Area", url:"", status:"Saved"},
    {role:"Machine Learning Engineer, AI Coding Tools", company:"ByteDance", location:"San Jose, CA", url:"https://www.linkedin.com/jobs/view/machine-learning-engineer-ai-coding-tools-at-bytedance-4395965393", status:"Saved"},
    {role:"Research Engineer, Post-Training Inference", company:"Together AI", location:"San Francisco, CA", url:"https://www.linkedin.com/jobs/view/research-engineer-post-training-inference-at-together-ai-4433912802", status:"Saved"}
  ];

  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

  function render() {
    var board = document.getElementById("board");
    var counts = document.getElementById("counts");
    board.innerHTML = "";
    counts.innerHTML = "";

    STATUSES.forEach(function(status) {
      var col = document.createElement("div");
      col.className = "col";
      var head = document.createElement("div");
      head.className = "col-head";
      head.style.color = COLORS[status];
      var list = jobs.filter(function(j) { return j.status === status; });
      head.innerHTML = "<span>" + status + "</span><span>" + list.length + "</span>";
      col.appendChild(head);

      if (list.length === 0) {
        var empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No jobs";
        col.appendChild(empty);
      }

      list.forEach(function(job) {
        var card = document.createElement("div");
        card.className = "job-card";

        var del = document.createElement("button");
        del.className = "del";
        del.innerHTML = "&times;";
        del.title = "Remove";
        del.onclick = function() { removeJob(job.id); };
        card.appendChild(del);

        var role = document.createElement("p");
        role.className = "role";
        role.textContent = job.role;
        card.appendChild(role);

        var company = document.createElement("p");
        company.className = "company";
        company.textContent = job.company + (job.location ? " · " + job.location : "");
        card.appendChild(company);

        var notes = document.createElement("textarea");
        notes.placeholder = "Notes";
        notes.value = job.notes || "";
        notes.oninput = function() { job.notes = notes.value; save(); };
        card.appendChild(notes);

        var meta = document.createElement("div");
        meta.className = "meta";

        var select = document.createElement("select");
        STATUSES.forEach(function(s) {
          var opt = document.createElement("option");
          opt.value = s;
          opt.textContent = s;
          if (s === job.status) opt.selected = true;
          select.appendChild(opt);
        });
        select.onchange = function() { job.status = select.value; save(); render(); };
        meta.appendChild(select);

        if (job.url) {
          var link = document.createElement("a");
          link.href = job.url;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.textContent = "View";
          meta.appendChild(link);
        }

        card.appendChild(meta);
        col.appendChild(card);
      });

      board.appendChild(col);
    });

    STATUSES.forEach(function(status) {
      var n = jobs.filter(function(j) { return j.status === status; }).length;
      var pill = document.createElement("span");
      pill.className = "count-pill";
      pill.textContent = status + " " + n;
      counts.appendChild(pill);
    });
  }

  function save() {
    try {
      localStorage.setItem(STORE_KEY, JSON.stringify(jobs));
    } catch (e) {
      console.error("Save failed", e);
    }
  }

  function removeJob(id) {
    jobs = jobs.filter(function(j) { return j.id !== id; });
    save();
    render();
  }

  function load() {
    try {
      var raw = localStorage.getItem(STORE_KEY);
      jobs = raw ? JSON.parse(raw) : null;
    } catch (e) {
      jobs = null;
    }
    if (!jobs || jobs.length === 0) {
      jobs = seed.map(function(j) { j.id = uid(); j.notes = ""; return j; });
      save();
    }
    render();
  }

  document.getElementById("addBtn").onclick = function() {
    var role = document.getElementById("newRole").value.trim();
    var company = document.getElementById("newCompany").value.trim();
    var url = document.getElementById("newUrl").value.trim();
    if (!role || !company) return;
    jobs.unshift({ id: uid(), role: role, company: company, location: "", url: url, status: "Saved", notes: "" });
    document.getElementById("newRole").value = "";
    document.getElementById("newCompany").value = "";
    document.getElementById("newUrl").value = "";
    save();
    render();
  };

  document.getElementById("exportBtn").onclick = function() {
    var blob = new Blob([JSON.stringify(jobs, null, 2)], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "job-tracker-export.json";
    a.click();
    URL.revokeObjectURL(url);
  };

  document.getElementById("importBtn").onclick = function() {
    document.getElementById("importFile").click();
  };

  document.getElementById("importFile").onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(evt) {
      try {
        var imported = JSON.parse(evt.target.result);
        if (Array.isArray(imported)) {
          jobs = imported;
          save();
          render();
        }
      } catch (err) {
        alert("Invalid file format.");
      }
    };
    reader.readAsText(file);
  };

  load();
})();
</script>
</body>
</html>
